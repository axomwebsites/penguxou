<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguxou Sim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-window {
            width: 360px;
            height: 640px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #ffeaa7;
        }
        #screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            position: relative;
        }
        #stats {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .stat-box {
            background: rgba(255,255,255,0.6);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
        }
        #penguin {
            font-size: 80px;
            margin-top: 40px;
            transition: transform 0.1s ease;
        }
        #shelf {
            width: 100%;
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 15px;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            justify-content: center;
            min-height: 80px;
        }
        .item-btn {
            background: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .item-btn span {
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div id="screen">
            <div id="stats">
                <div class="stat-box">Hunger: <span id="hunger-val">50</span>%</div>
                <div class="stat-box">Health: <span id="health-val">100</span>%</div>
            </div>

            <div id="penguin">🐧</div>

            <div id="shelf"></div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSynthSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === "feed") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === "heal") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            }
        }

        let state = {
            hunger: 50,
            health: 100
        };

        function updateUI() {
            document.getElementById("hunger-val").innerText = state.hunger;
            document.getElementById("health-val").innerText = state.health;
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function bootstrap() {
            try {
                const res = await fetch("manifest.json");
                const manifest = await res.json();
                
                if (manifest.assets) {
                    for (let key in manifest.assets) {
                        for (let path of manifest.assets[key]) {
                            try {
                                await loadScript(path);
                            } catch (err) {}
                        }
                    }
                }
            } catch (e) {}
            updateUI();
        }

        window.addEventListener("click", () => {
            initAudio();
        }, { once: true });

        bootstrap();
    </script>
</body>
</html>
