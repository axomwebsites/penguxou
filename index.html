<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguxou</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { box-sizing: border-box; user-select: none; font-family: 'Courier New', Courier, monospace; }
body { margin: 0; padding: 0; background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
#gamecontainer { width: 100%; max-width: 480px; height: 95vh; max-height: 800px; background: #f0f0f0; border: 8px solid #444; border-radius: 25px; position: relative; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: #ddd; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ccc; }
#petname { font-weight: bold; font-size: 18px; background: transparent; border: none; border-bottom: 2px dashed #444; text-align: center; width: 140px; }
#petname:focus { outline: none; border-bottom: 2px solid #000; }
#stats { display: flex; gap: 15px; font-weight: bold; font-size: 15px; }
#barscontainer { background: #eee; padding: 10px; display: flex; justify-content: space-around; border-bottom: 3px solid #ccc; }
.statbar { display: flex; flex-direction: column; align-items: center; width: 22%; }
.statbar i { font-size: 16px; margin-bottom: 5px; }
.barouter { width: 100%; height: 14px; background: #ddd; border-radius: 7px; overflow: hidden; border: 1px solid #999; }
.barinner { height: 100%; width: 100%; transition: width 0.3s; }
#hungerbar { background: #ff4d4d; }
#energybar { background: #ffcc00; }
#healthbar { background: #2ecc71; }
#boredombar { background: #3498db; }
#roomview { flex: 1; position: relative; background: #ffeaa7; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.5s; overflow: hidden; }
#roomtitle { position: absolute; top: 15px; font-size: 22px; font-weight: bold; background: rgba(255,255,255,0.8); padding: 6px 20px; border-radius: 20px; text-transform: lowercase; z-index: 5; }
#penguxou { width: 160px; height: 180px; position: relative; display: flex; justify-content: center; align-items: center; transition: transform 0.2s, bottom 0.2s; z-index: 3; }
#penguxou.eating { animation: chew 0.3s infinite; }
@keyframes chew { 0% { transform: scale(1); } 50% { transform: scale(1.08) translateY(-5px); } 100% { transform: scale(1); } }
.body { width: 100%; height: 100%; background: #2c3e50; border-radius: 50% 50% 45% 45%; position: absolute; border: 4px solid #000; }
.belly { width: 72%; height: 70%; background: #fff; border-radius: 50%; position: absolute; bottom: 5px; border: 3px solid #000; }
.eye { width: 32px; height: 36px; background: #fff; border-radius: 50%; position: absolute; top: 40px; border: 3px solid #000; display: flex; justify-content: center; align-items: center; }
.eye.left { left: 32px; } .eye.right { right: 32px; }
.pupil { width: 12px; height: 12px; background: #000; border-radius: 50%; }
.beak { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 18px solid #f39c12; position: absolute; top: 76px; z-index: 4; }
.wing { width: 32px; height: 68px; background: #2c3e50; border-radius: 50%; position: absolute; top: 72px; border: 3px solid #000; }
.wing.left { left: -16px; transform: rotate(20deg); } .wing.right { right: -16px; transform: rotate(-20deg); }
.foot { width: 42px; height: 22px; background: #f39c12; border-radius: 50%; position: absolute; bottom: -6px; border: 3px solid #000; }
.foot.left { left: 25px; } .foot.right { right: 25px; }
.hat { position: absolute; top: -28px; font-size: 42px; color: #e74c3c; display: none; z-index: 10; }
#pillow { width: 200px; height: 50px; background: #e74c3c; border: 4px solid #000; border-radius: 50% 50% 40% 40%; position: absolute; bottom: 40px; display: none; z-index: 2; box-shadow: inset 0 8px 0 rgba(255,255,255,0.3); }
#lampcontainer { position: absolute; top: 80px; right: 40px; display: none; flex-direction: column; align-items: center; z-index: 5; }
#lamphead { font-size: 45px; color: #f1c40f; cursor: pointer; filter: drop-shadow(0 0 10px rgba(241,196,15,0.8)); }
#lamphead.off { color: #7f8c8d; filter: none; }
#lampcord { width: 4px; height: 40px; background: #333; position: relative; cursor: pointer; }
#lamppull { width: 14px; height: 14px; background: #d35400; border-radius: 50%; position: absolute; bottom: -10px; left: -5px; }
#rope { position: absolute; bottom: 50px; width: 140px; height: 80px; border: 5px dashed #7f8c8d; border-bottom: none; border-radius: 70px 70px 0 0; display: none; z-index: 1; }
#car { position: absolute; bottom: 30px; font-size: 45px; color: #e74c3c; display: none; cursor: grab; z-index: 4; filter: drop-shadow(2px 2px 0 #000); }
#gameslauncher { font-size: 40px; color: #2c3e50; cursor: pointer; display: none; background: #fff; padding: 12px; border-radius: 50%; border: 3px solid #333; box-shadow: 0 4px 0 #333; }
#gameslauncher:active { transform: translateY(4px); box-shadow: none; }
#shelf { width: 100%; height: 95px; background: rgba(255,255,255,0.75); border-top: 3px solid #ccc; display: flex; align-items: center; padding: 10px; gap: 15px; overflow-x: auto; }
.item { width: 65px; height: 65px; background: #fff; border: 3px solid #666; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 26px; cursor: grab; position: relative; touch-action: none; flex-shrink: 0; box-shadow: 0 3px 0 #666; }
.item span { position: absolute; bottom: 2px; right: 4px; font-size: 11px; font-weight: bold; background: #eee; padding: 1px 4px; border-radius: 4px; border: 1px solid #999; }
#bottomnav { background: #ddd; display: flex; justify-content: space-around; padding: 12px; border-top: 3px solid #ccc; }
.navbtn { background: #fff; border: 3px solid #666; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 13px; box-shadow: 0 3px 0 #666; }
.navbtn:active { transform: translateY(3px); box-shadow: none; }
.navbtn i { font-size: 20px; }
#shopmodal, #arcadeframe { position: absolute; top: 5%; left: 4%; width: 92%; height: 90%; background: #fff; border: 5px solid #333; border-radius: 20px; z-index: 200; display: none; flex-direction: column; padding: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
#shopmodal h3, #arcadeframe h3 { margin-top: 0; text-transform: lowercase; font-size: 24px; border-bottom: 3px solid #333; padding-bottom: 8px; }
.shoplist, .arcadegrid { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 5px; }
.arcadegrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.shopitem { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 2px solid #ccc; border-radius: 8px; }
.shopitem i { font-size: 22px; }
.buybtn, .playgamebtn { background: #2ecc71; border: 2px solid #27ae60; color: white; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 0 #27ae60; }
.buybtn:active, .playgamebtn:active { transform: translateY(2px); box-shadow: none; }
.arcadepill { background: #f9f9f9; border: 3px solid #444; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; box-shadow: 0 3px 0 #444; }
.arcadepill i { font-size: 28px; margin-bottom: 8px; color: #2980b9; }
.arcadepill span { font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: lowercase; }
.frameclose { background: #e74c3c; color: white; border: 3px solid #c0392b; padding: 8px 16px; border-radius: 6px; align-self: center; cursor: pointer; margin-top: 12px; font-weight: bold; box-shadow: 0 3px 0 #c0392b; }
.frameclose:active { transform: translateY(3px); box-shadow: none; }
#gamecanvas { width: 100%; height: 100%; background: #87ceeb; display: none; position: absolute; top: 0; left: 0; z-index: 300; }
#gamecontrols { position: absolute; bottom: 25px; width: 100%; display: none; justify-content: space-around; z-index: 301; padding: 0 20px; }
.ctrlbtn { background: rgba(255,255,255,0.9); border: 3px solid #333; padding: 14px 28px; font-size: 24px; border-radius: 12px; box-shadow: 0 4px 0 #333; cursor: pointer; }
.ctrlbtn:active { transform: translateY(4px); box-shadow: none; }
#exitgame { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: 3px solid #c0392b; padding: 8px 16px; border-radius: 6px; z-index: 302; display: none; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div id="gamecontainer">
<div id="topbar">
<input type="text" id="petname" value="penguxou">
<div id="stats">
<div><i class="fas fa-coins"></i> <span id="coinscount">300</span></div>
<div>lv <span id="levelcount">1</span></div>
</div>
</div>

<div id="barscontainer">
<div class="statbar"><i class="fas fa-utensils"></i><div class="barouter"><div id="hungerbar" class="barinner"></div></div></div>
<div class="statbar"><i class="fas fa-bolt"></i><div class="barouter"><div id="energybar" class="barinner"></div></div></div>
<div class="statbar"><i class="fas fa-heartbeat"></i><div class="barouter"><div id="healthbar" class="barinner"></div></div></div>
<div class="statbar"><i class="fas fa-gamepad"></i><div class="barouter"><div id="boredombar" class="barinner"></div></div></div>
</div>

<div id="roomview">
<div id="roomtitle">kitchen</div>
<div id="lampcontainer"><i class="fas fa-lightbulb" id="lamphead"></i><div id="lampcord"><div id="lamppull"></div></div></div>
<div id="rope"></div><div id="pillow"></div><div id="car" class="fas fa-car"></div>
<i class="fas fa-gamepad" id="gameslauncher"></i>
<div id="penguxou">
<div class="hat fas fa-graduation-cap" id="equippedhat"></div><div class="wing left"></div><div class="foot left"></div><div class="foot right"></div><div class="body"></div><div class="belly"></div><div class="eye left"><div class="pupil"></div></div><div class="eye right"><div class="pupil"></div></div><div class="beak"></div><div class="wing right"></div>
</div>
</div>

<div id="shelf"></div>
<div id="bottomnav">
<button class="navbtn" id="prevroom"><i class="fas fa-arrow-left"></i>left</button>
<button class="navbtn" id="openstore"><i class="fas fa-shopping-cart"></i>buy</button>
<button class="navbtn" id="nextroom"><i class="fas fa-arrow-right"></i>right</button>
</div>

<div id="shopmodal"><h3>shop</h3><div class="shoplist" id="shoplistcontent"></div><button class="frameclose" id="closeshop">close</button></div>
<div id="arcadeframe"><h3>arcade</h3><div class="arcadegrid" id="arcadegridcontent"></div><button class="frameclose" id="closearcade">close</button></div>

<canvas id="gamecanvas"></canvas>
<div id="gamecontrols">
<button class="ctrlbtn" id="moveleft"><i class="fas fa-arrow-left"></i></button>
<button class="ctrlbtn" id="moveright"><i class="fas fa-arrow-right"></i></button>
</div>
<button id="exitgame">exit</button>
</div>

<script>
const state = { hunger: 50, energy: 80, health: 60, boredom: 40, coins: 300, level: 1, room: 0, sleeping: false, inventory: {}, boughtitems: {} };
const rooms = ["kitchen", "laboratory", "gameroom", "bedroom", "outside"];
const shelf = document.getElementById("shelf");
const penguxou = document.getElementById("penguxou");
const canvas = document.getElementById("gamecanvas");
const ctx = canvas.getContext("2d");

let activeitem = null, activeelement = null, gameinterval = null, currentgameref = null;
let gameactive = false, playerx = 200, playery = 380, playervy = 0, playervx = 0;
window.objects = []; window.gamescore = 0; window.gametimer = 0; window.gamesubstate = null;

let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSynthSound(type) {
  initAudio();
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;

  if (type === "feed") {
    osc.type = "triangle";
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === "heal") {
    osc.type = "sine";
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
    osc.start(now);
    osc.stop(now + 0.25);
  } else if (type === "click") {
    osc.type = "sine";
    osc.frequency.setValueAtTime(600, now);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
    osc.start(now);
    osc.stop(now + 0.05);
  }
}

async function bootstrap() {
  try {
    const res = await fetch("manifest.json");
    const manifest = await res.json();
    
    if (manifest.assets) {
      for (let key in manifest.assets) {
        for (let path of manifest.assets[key]) {
          await loadscript(path);
        }
      }
    }
  } catch (e) {}
  updatebars();
  updateroom();
}

function loadscript(src) {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => resolve();
    document.head.appendChild(s);
  });
}

function updatebars() {
  document.getElementById("hungerbar").style.width = state.hunger + "%";
  document.getElementById("energybar").style.width = state.energy + "%";
  document.getElementById("healthbar").style.width = state.health + "%";
  document.getElementById("boredombar").style.width = state.boredom + "%";
  document.getElementById("coinscount").innerText = state.coins;
  document.getElementById("levelcount").innerText = state.level;
}

function updateroom() {
  const room = rooms[state.room];
  document.getElementById("roomtitle").innerText = room;
  document.getElementById("roomview").style.background = 
    room === "kitchen" ? "#ffeaa7" : room === "laboratory" ? "#e8f8f5" : room === "gameroom" ? "#d6eaf8" : room === "bedroom" ? (state.sleeping ? "#1a252f" : "#fadbd8") : "#d5f5e3";

  document.getElementById("lampcontainer").style.display = room === "bedroom" ? "flex" : "none";
  document.getElementById("pillow").style.display = room === "bedroom" ? "block" : "none";
  document.getElementById("gameslauncher").style.display = room === "gameroom" ? "block" : "none";
  document.getElementById("car").style.display = room === "outside" ? "block" : "none";
  document.getElementById("rope").style.display = room === "outside" ? "block" : "none";
  penguxou.style.bottom = room === "bedroom" ? "20px" : "0px";

  if (room === "outside") {
    document.getElementById("car").style.left = "40px";
    document.getElementById("rope").style.left = "160px";
  }
  rendershelf();
}

function rendershelf() {
  shelf.innerHTML = "";
  const room = rooms[state.room];
  if (room === "kitchen") {
    if (window.markets?.food) {
      window.markets.food.forEach(f => { if(state.inventory[f.id]) createshelfitem(f.icon, f.id, state.inventory[f.id]); });
    }
    if (window.markets?.drinks) {
      window.markets.drinks.forEach(d => { if(state.inventory[d.id]) createshelfitem(d.icon, d.id, state.inventory[d.id]); });
    }
  } else if (room === "laboratory" && window.potions) {
    for (let p in window.potions) { if(state.inventory[p]) createshelfitem(window.potions[p].icon, p, state.inventory[p]); }
  } else if ((room === "bedroom" || room === "outside") && window.clothes) {
    for (let c in window.clothes) { if(state.boughtitems[c]) createshelfitem(window.clothes[c].icon, c, "hat"); }
  }
}

function createshelfitem(icon, id, qty) {
  const div = document.createElement("div");
  div.className = "item"; div.innerHTML = `<i class="fas ${icon}"></i>`;
  if (qty !== "hat") div.innerHTML += `<span>${qty}</span>`;
  div.dataset.id = id;
  div.addEventListener("mousedown", dragstart);
  div.addEventListener("touchstart", dragstart, { passive: false });
  shelf.appendChild(div);
}

function dragstart(e) {
  if (state.sleeping) return; e.preventDefault();
  activeelement = e.currentTarget.cloneNode(true);
  activeelement.style.position = "absolute"; activeelement.style.zIndex = "1000"; activeelement.style.pointerEvents = "none";
  document.body.appendChild(activeelement); activeitem = e.currentTarget.dataset.id;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  moveat(cx, cy);
  document.addEventListener("mousemove", dragmove); document.addEventListener("mouseup", dragend);
  document.addEventListener("touchmove", dragmove, { passive: false }); document.addEventListener("touchend", dragend);
}

function moveat(x, y) { activeelement.style.left = (x - 32) + "px"; activeelement.style.top = (y - 32) + "px"; }
function dragmove(e) { const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; moveat(cx, cy); }

function dragend() {
  document.removeEventListener("mousemove", dragmove); document.removeEventListener("mouseup", dragend);
  document.removeEventListener("touchmove", dragmove); document.removeEventListener("touchend", dragend);
  const r = penguxou.getBoundingClientRect(); const er = activeelement.getBoundingClientRect();
  if (er.right > r.left && er.left < r.right && er.bottom > r.top && er.top < r.bottom) applyitem(activeitem);
  activeelement.remove(); activeelement = null; activeitem = null;
}

function applyitem(id) {
  let item = window.potions?.[id] || window.clothes?.[id] || window.markets?.food?.find(f=>f.id===id) || window.markets?.drinks?.find(d=>d.id===id);
  if (!item) return;
  if (item.type === "food" || item.type === "medicine") {
    if (item.stat === "health") { state.health = Math.min(100, state.health + item.value); playSynthSound("heal"); }
    else if (item.stat === "energy") { state.energy = Math.min(100, state.energy + item.value); playSynthSound("heal"); }
    else if (item.stat === "all") { state.health = 100; state.energy = 100; state.hunger = 100; playSynthSound("heal"); }
    else { state.hunger = Math.max(0, Math.min(100, state.hunger + (item.value || 20))); playSynthSound("feed"); }
    state.inventory[id]--;
    penguxou.classList.add("eating"); setTimeout(() => penguxou.classList.remove("eating"), 1200);
  } else if (item.type === "hat") {
    const hat = document.getElementById("equippedhat");
    hat.className = `hat fas ${item.icon}`;
    hat.style.display = hat.style.display === "block" ? "none" : "block";
    playSynthSound("click");
  }
  updatebars(); rendershelf();
}

document.getElementById("prevroom").addEventListener("click", () => { state.room = (state.room - 1 + rooms.length) % rooms.length; playSynthSound("click"); updateroom(); });
document.getElementById("nextroom").addEventListener("click", () => { state.room = (state.room + 1) % rooms.length; playSynthSound("click"); updateroom(); });

const togglelamp = () => { state.sleeping = !state.sleeping; document.getElementById("lamphead").classList.toggle("off", state.sleeping); playSynthSound("click"); updateroom(); };
document.getElementById("lamphead").addEventListener("click", togglelamp);
document.getElementById("lampcord").addEventListener("click", togglelamp);

document.getElementById("openstore").addEventListener("click", () => {
  playSynthSound("click");
  const list = document.getElementById("shoplistcontent"); list.innerHTML = "";
  let items = [];
  if (window.markets?.food) items = items.concat(window.markets.food);
  if (window.markets?.drinks) items = items.concat(window.markets.drinks);
  if (window.potions) items = items.concat(Object.values(window.potions));
  if (window.clothes) items = items.concat(Object.values(window.clothes));

  items.forEach(i => {
    const row = document.createElement("div"); row.className = "shopitem";
    row.innerHTML = `<div><i class="fas ${i.icon}"></i> ${i.name} (${i.cost} c)</div><button class="buybtn" data-id="${i.id}" data-cost="${i.cost}">buy</button>`;
    list.appendChild(row);
  });
  document.getElementById("shopmodal").style.display = "flex";
});

document.getElementById("shoplistcontent").addEventListener("click", (e) => {
  if (e.target.classList.contains("buybtn")) {
    const cost = parseInt(e.target.dataset.cost); const id = e.target.dataset.id;
    if (state.coins >= cost) {
      state.coins -= cost;
      if (window.clothes?.[id]) state.boughtitems[id] = true;
      else state.inventory[id] = (state.inventory[id] || 0) + 1;
      playSynthSound("click"); updatebars(); rendershelf();
    } else { alert("insufficient funds"); }
  }
});
document.getElementById("closeshop").addEventListener("click", () => { playSynthSound("click"); document.getElementById("shopmodal").style.display = "none"; });

document.getElementById("gameslauncher").addEventListener("click", () => {
  playSynthSound("click");
  const grid = document.getElementById("arcadegridcontent"); grid.innerHTML = "";
  if (!window.games) return;
  for (let title in window.games) {
    const pill = document.createElement("div"); pill.className = "arcadepill";
    pill.innerHTML = `<i class="fas ${window.games[title].icon}"></i><span>${title}</span><button class="playgamebtn" data-title="${title}">play</button>`;
    grid.appendChild(pill);
  }
  document.getElementById("arcadeframe").style.display = "flex";
});

document.getElementById("closearcade").addEventListener("click", () => { playSynthSound("click"); document.getElementById("arcadeframe").style.display = "none"; });
document.getElementById("arcadegridcontent").addEventListener("click", (e) => {
  if (e.target.classList.contains("playgamebtn")) {
    document.getElementById("arcadeframe").style.display = "none";
    launchgame(e.target.dataset.title);
  }
});

function drawpenguin(x, y, w, h) {
  ctx.fillStyle = "#2c3e50"; ctx.beginPath(); ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(x + w/2, y + h*0.6, w*0.35, h*0.35, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.3, w*0.12, 0, Math.PI*2); ctx.arc(x + w*0.65, y + h*0.3, w*0.12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.3, w*0.05, 0, Math.PI*2); ctx.arc(x + w*0.65, y + h*0.3, w*0.05, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#f39c12"; ctx.beginPath(); ctx.moveTo(x + w*0.42, y + h*0.42); ctx.lineTo(x + w*0.58, y + h*0.42); ctx.lineTo(x + w*0.5, y + h*0.52); ctx.closePath(); ctx.fill();
}

function launchgame(title) {
  currentgameref = window.games[title]; gameactive = true; window.gamescore = 0; window.objects = []; window.gametimer = 0;
  playerx = 200; playery = 380; playervy = 0; playervx = 0;
  canvas.width = 440; canvas.height = 480; canvas.style.display = "block";
  document.getElementById("gamecontrols").style.display = "flex"; document.getElementById("exitgame").style.display = "block";
  if (currentgameref.init) currentgameref.init();
  gameinterval = setInterval(loopgame, 1000/30);
}

function loopgame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height); window.gametimer++;
  currentgameref.loop(ctx, canvas, state, playerx, playery, drawpenguin, endgame);
  ctx.fillStyle = "#000"; ctx.font = "bold 18px Courier"; ctx.fillText("score: " + window.gamescore, 15, 30);
}

document.getElementById("moveleft").addEventListener("mousedown", () => { playerx = Math.max(0, playerx - 35); window.playervx = -6; playSynthSound("click"); });
document.getElementById("moveright").addEventListener("mousedown", () => { playerx = Math.min(390, playerx + 35); window.playervx = 6; playSynthSound("click"); });
document.getElementById("moveleft").addEventListener("mouseup", () => window.playervx = 0);
document.getElementById("moveright").addEventListener("mouseup", () => window.playervx = 0);
canvas.addEventListener("click", () => { if (window.playery === 380) window.playervy = -16; });

function endgame() {
  clearInterval(gameinterval); gameactive = false; canvas.style.display = "none";
  document.getElementById("gamecontrols").style.display = "none"; document.getElementById("exitgame").style.display = "none";
  state.boredom = Math.min(100, state.boredom + 25); updatebars(); alert("game over. score: " + window.gamescore);
}
document.getElementById("exitgame").addEventListener("click", endgame);

setInterval(() => {
  if (state.sleeping) { state.energy = Math.min(100, state.energy + 6); state.hunger = Math.max(0, state.hunger - 1); }
  else { state.hunger = Math.max(0, state.hunger - 2); state.energy = Math.max(0, state.energy - 1); state.boredom = Math.max(0, state.boredom - 2); }
  if (state.hunger < 15 || state.energy < 15) state.health = Math.max(0, state.health - 2);
  if (Math.random() < 0.04 && state.hunger > 40 && state.energy > 40) state.level++;
  updatebars();
}, 4000);

let dragcar = false;
document.getElementById("car").addEventListener("mousedown", () => dragcar = true);
document.getElementById("roomview").addEventListener("mousemove", (e) => {
  if (dragcar && rooms[state.room] === "outside") {
    const r = document.getElementById("roomview").getBoundingClientRect();
    let x = Math.max(10, Math.min(400, e.clientX - r.left - 22));
    document.getElementById("car").style.left = x + "px"; state.boredom = Math.min(100, state.boredom + 0.4); updatebars();
  }
});
document.addEventListener("mouseup", () => dragcar = false);

window.addEventListener("click", () => {
  initAudio();
}, { once: true });

bootstrap();
</script>
</body>
</html>
