<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ponxou</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
        {
            "imports": {
                "#state": "./js/state.js",
                "#room": "./js/room.js",
                "#pet": "./js/pet.js",
                "#shop": "./js/shop.js",
                "#inventory": "./js/inventory.js",
                "#games": "./js/games/games.js",
                "#foodmarket": "./js/market/foodmarket/items.js",
                "#drinksmarket": "./js/market/drinksmarket/items.js",
                "#clothes": "./js/market/clothes/items.js",
                "#potions": "./js/market/potions/items.js"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="headerleft">
                <input type="text" class="nameinput" id="petnameinput" value="Ponxou" maxlength="12" />
            </div>
            <div class="headerright">
                <span class="levelbadge" id="levelbadge">Lv.1</span>
                <div class="coindisplay">
                    <img src="https://uploads.onecompiler.com/43xa2dbu5/1781634264990/1000067507.jpg" alt="coins" />
                    <span id="coindisplay">150</span>
                </div>
            </div>
        </div>
        <div class="roomnav">
            <button class="navbtn" id="roomleftbtn">‹</button>
            <div class="roomindicators" id="roomindicators"><span class="active"></span><span></span><span></span><span></span><span></span></div>
            <span class="roomlabel" id="roomlabel">Kitchen</span>
            <button class="navbtn" id="roomrightbtn">›</button>
        </div>
        <div class="stage" id="stage">
            <div class="roombg active" id="roombg"></div>
            <div class="ponxoucontainer" id="ponxoucontainer">
                <div class="poubody">
                    <div class="poubelly"></div>
                    <div class="poueye left"><div class="white"><div class="pupil"></div></div></div>
                    <div class="poueye right"><div class="white"><div class="pupil"></div></div></div>
                    <div class="beak"></div>
                    <div class="pouwing leftwing"></div>
                    <div class="pouwing rightwing"></div>
                    <div class="foot leftfoot"></div>
                    <div class="foot rightfoot"></div>
                </div>
            </div>
            <div class="roomcontent" id="roomcontent">
                <div class="shelf" id="shelf"></div>
                <div class="interactarea" id="interactarea"></div>
            </div>
            <div class="statusbar" id="statusbar">
                <div class="statusitem"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634251192/1000067504.jpg" /><div class="meter"><div class="fill" id="hungerfill" style="width:70%"></div></div><span id="hungerval">70</span></div>
                <div class="statusitem"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634262701/1000067505.jpg" /><div class="meter"><div class="fill" id="energyfill" style="width:80%"></div></div><span id="energyval">80</span></div>
                <div class="statusitem"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634257920/1000067506.jpg" /><div class="meter"><div class="fill" id="healthfill" style="width:90%"></div></div><span id="healthval">90</span></div>
                <div class="statusitem"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634232420/1000067503.jpg" /><div class="meter"><div class="fill" id="boredomfill" style="width:30%"></div></div><span id="boredomval">30</span></div>
            </div>
        </div>
        <div class="actionbar">
            <button class="actionbtn" id="shopbtn">🛒 Shop</button>
            <button class="actionbtn" id="inventorybtn">📦 Inventory</button>
            <button class="actionbtn" id="sleepbtn">💤 Sleep</button>
            <button class="actionbtn" id="arcadebtn">🎮 Arcade</button>
        </div>
    </div>
    <div class="modaloverlay" id="modaloverlay">
        <div class="modal" id="modal">
            <div class="modalheader">
                <span id="modaltitle">Shop</span>
                <button class="modalclose" id="modalclose">&times;</button>
            </div>
            <div class="modalbody" id="modalbody"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
