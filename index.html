<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ponxou</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
        {
            "imports": {
                "#state": "./js/state.js",
                "#room": "./js/room.js",
                "#pet": "./js/pet.js",
                "#shop": "./js/shop.js",
                "#inventory": "./js/inventory.js",
                "#games": "./js/games/games.js",
                "#foodmarket": "./js/market/foodmarket/items.js",
                "#drinksmarket": "./js/market/drinksmarket/items.js",
                "#clothes": "./js/market/clothes/items.js",
                "#potions": "./js/market/potions/items.js"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="header-left">
                <input type="text" class="name-input" id="petNameInput" value="Ponxou" maxlength="12" />
            </div>
            <div class="header-right">
                <span class="level-badge" id="levelBadge">Lv.1</span>
                <div class="coin-display">
                    <img src="https://uploads.onecompiler.com/43xa2dbu5/1781634264990/1000067507.jpg" alt="coins" />
                    <span id="coinDisplay">150</span>
                </div>
            </div>
        </div>
        <div class="room-nav">
            <button class="nav-btn" id="roomLeftBtn">‹</button>
            <div class="room-indicators" id="roomIndicators"><span class="active"></span><span></span><span></span><span></span><span></span></div>
            <span class="room-label" id="roomLabel">Kitchen</span>
            <button class="nav-btn" id="roomRightBtn">›</button>
        </div>
        <div class="stage" id="stage">
            <div class="room-bg active" id="roomBg"></div>
            <div class="ponxou-container" id="ponxouContainer">
                <div class="poubody">
                    <div class="poubelly"></div>
                    <div class="poueye left"><div class="white"><div class="pupil"></div></div></div>
                    <div class="poueye right"><div class="white"><div class="pupil"></div></div></div>
                    <div class="beak"></div>
                    <div class="pouwing leftwing"></div>
                    <div class="pouwing rightwing"></div>
                    <div class="foot leftfoot"></div>
                    <div class="foot rightfoot"></div>
                </div>
            </div>
            <div class="room-content" id="roomContent">
                <div class="shelf" id="shelf"></div>
                <div class="interact-area" id="interactArea"></div>
            </div>
            <div class="status-bar" id="statusBar">
                <div class="status-item"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634251192/1000067504.jpg" /><div class="meter"><div class="fill" id="hungerFill" style="width:70%"></div></div><span id="hungerVal">70</span></div>
                <div class="status-item"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634262701/1000067505.jpg" /><div class="meter"><div class="fill" id="energyFill" style="width:80%"></div></div><span id="energyVal">80</span></div>
                <div class="status-item"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634257920/1000067506.jpg" /><div class="meter"><div class="fill" id="healthFill" style="width:90%"></div></div><span id="healthVal">90</span></div>
                <div class="status-item"><img src="https://uploads.onecompiler.com/43xa2dbu5/1781634232420/1000067503.jpg" /><div class="meter"><div class="fill" id="boredomFill" style="width:30%"></div></div><span id="boredomVal">30</span></div>
            </div>
        </div>
        <div class="action-bar">
            <button class="action-btn" id="shopBtn">🛒 Shop</button>
            <button class="action-btn" id="inventoryBtn">📦 Inventory</button>
            <button class="action-btn" id="sleepBtn">💤 Sleep</button>
            <button class="action-btn" id="arcadeBtn">🎮 Arcade</button>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <span id="modalTitle">Shop</span>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
